name: Deploy to EC2 with Docker

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Build with Maven
        run: ./mvnw clean package

      - name: List files after build (debug)
        run: ls -la target/

      - name: Deploy JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar, dockerfile"
          target: "/home/ec2-user/app"
          strip_components: 1

      - name: Deploy with Docker
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== CONTENIDO COMPLETO DEL DIRECTORIO ==="
            cd /home/ec2-user/app
            pwd
            ls -la
            echo "=== FIN LISTADO ==="
            
            # Verificar si existe dockerfile
            if [ -f "dockerfile" ]; then
              echo "✅ dockerfile existe"
              cat dockerfile
            else
              echo "❌ dockerfile NO existe"
            fi
            
            # Verificar JARs
            echo "=== JARS ENCONTRADOS ==="
            ls -la *.jar || echo "No hay JARs"
            
            # Si no hay dockerfile, crearlo
            if [ ! -f "dockerfile" ] && [ ! -f "Dockerfile" ]; then
              echo "=== CREANDO DOCKERFILE ==="
              cat > dockerfile << 'EOF'
            FROM amazoncorretto:17
            WORKDIR /app
            COPY *.jar app.jar
            EXPOSE 8080
            CMD ["java", "-jar", "app.jar"]
            EOF
              echo "✅ Dockerfile creado"
              cat dockerfile
            fi
            
            # Detener y eliminar contenedor anterior
            echo "=== DETENIENDO CONTENEDOR ANTIGUO ==="
            sudo docker stop myapp 2>/dev/null || true
            sudo docker rm myapp 2>/dev/null || true
            
            # Construir nueva imagen
            echo "=== CONSTRUYENDO IMAGEN ==="
            sudo docker build -f dockerfile -t myapp:latest .
            
            # Ejecutar nuevo contenedor
            echo "=== EJECUTANDO CONTENEDOR ==="
            sudo docker run -d \
              --name myapp \
              --restart always \
              -p 8080:8080 \
              -v /home/ec2-user/app/logs:/app/logs \
              myapp:latest
            
            # Mostrar resultados
            sleep 5
            echo "=== CONTENEDORES CORRIENDO ==="
            sudo docker ps
            echo "=== LOGS DE LA APLICACIÓN ==="
            sudo docker logs myapp --tail 20 || echo "No hay logs aún"
