name: Deploy to Synology

on:
  push:
    branches: [ synology ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Compilar
        run: ./mvnw clean package -DskipTests
      - name: Subir JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  deploy-to-nas:
    needs: deploy
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Descargar JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Crear carpeta de logs en el NAS
        run: |
          # Esta es la ruta REAL que funciona
          sudo mkdir -p /volume1/docker/mi-app/logs
          sudo chmod 777 /volume1/docker/mi-app/logs
          ls -la /volume1/docker/mi-app/logs

      - name: Construir imagen
        run: docker build -t mi-app:latest .

      - name: Desplegar
        run: |
          docker stop mi-app 2>/dev/null || true
          docker rm mi-app 2>/dev/null || true
          docker run -d \
            --name mi-app \
            --restart unless-stopped \
            -p 8081:8080 \
            -v /volume1/docker/mi-app/logs:/app/logs \
            mi-app:latest