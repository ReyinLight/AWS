name: Deploy to Synology

on:
  push:
    branches: [ synology ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compilar con Maven
        run: ./mvnw clean package -DskipTests

      - name: Subir JAR como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  deploy-to-nas:
    needs: deploy
    runs-on: self-hosted

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Construir imagen Docker
        run: |
          docker build -t mi-app:latest .

      - name: Desplegar contenedor
        run: |
          # Crear directorio de logs si no existe
          mkdir -p /volume1/docker/mi-app/logs
          
          # Detener y eliminar contenedor anterior
          docker stop mi-app 2>/dev/null || true
          docker rm mi-app 2>/dev/null || true
          
          sleep 3
          
          # Ejecutar nuevo contenedor
          docker run -d \
            --name mi-app \
            --restart unless-stopped \
            -p 8081:8080 \
            -v /volume1/docker/mi-app/logs:/app/logs \
            mi-app:latest