name: Deploy to Synology

on:
  push:
    branches: [ synology ]

jobs:
  deploy:
    runs-on: ubuntu-latest  # ← COMPILACIÓN EN GITHUB

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compilar con Maven
        run: ./mvnw clean package -DskipTests

      - name: Subir JAR como artefacto temporal
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1  # Se borra solo después de 1 día

  deploy-to-nas:
    needs: deploy  # Espera a que termine la compilación
    runs-on: self-hosted  # ← ESTO CORRE EN TU NAS
    if: success()  # Solo si compiló bien

    steps:
      - name: Checkout código (para Dockerfile)
        uses: actions/checkout@v4

      - name: Descargar JAR compilado
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Construir imagen Docker
        run: |
          docker build -t mi-app:latest .

      - name: Desplegar contenedor
        run: |
          # Detener y eliminar contenedor anterior si existe
          docker stop mi-app 2>/dev/null || true
          docker rm mi-app 2>/dev/null || true
          
          # Ejecutar nuevo contenedor
          docker run -d \
            --name mi-app \
            --restart unless-stopped \
            -p 8081:8080 \
            -v /volume1/docker/mi-app/logs:/app/logs \
            mi-app:latest

      - name: Limpiar imágenes viejas
        run: docker image prune -f