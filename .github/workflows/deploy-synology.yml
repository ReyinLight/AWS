name: Deploy to Synology

on:
  push:
    branches: [ synology ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compilar con Maven
        run: ./mvnw clean package -DskipTests

      - name: Subir JAR como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  deploy-to-nas:
    needs: deploy
    runs-on: self-hosted

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Descargar JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Construir imagen Docker
        run: |
          docker build -t mi-app:latest .

      - name: Desplegar contenedor
        run: |
          echo "=== DEPURACIÓN ==="
          echo "Usuario actual: $(whoami)"
          echo "Directorio actual: $(pwd)"

          echo "=== VERIFICANDO RUTA COMPLETA ==="
          ls -la /volume1/docker/ || echo "❌ No existe /volume1/docker"

          echo "=== CREANDO DIRECTORIO ==="
          mkdir -pv /volume1/docker/mi-app/logs
          echo "Código de salida mkdir: $?"

          echo "=== VERIFICANDO QUE SE CREÓ ==="
          ls -la /volume1/docker/mi-app/logs || echo "❌ No se pudo crear"

          echo "=== PERMISOS ==="
          ls -la /volume1/docker/

          # Ahora sí, el deploy
          docker stop mi-app 2>/dev/null || true
          docker rm mi-app 2>/dev/null || true
          sleep 3

          docker run -d \
            --name mi-app \
            --restart unless-stopped \
            -p 8081:8080 \
            -v /volume1/docker/mi-app/logs:/app/logs \
            mi-app:latest